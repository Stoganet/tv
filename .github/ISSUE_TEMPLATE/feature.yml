name: Feature
description: New capability or behavior change.
labels: [enhancement]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences. What should exist that doesn't?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in and out of scope for this change?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance
      description: How do we know it's done? Bullet list.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: References, prior art, design considerations.
